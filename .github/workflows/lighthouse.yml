name: Lighthouse CI

# Runs Lighthouse on every PR so we catch perf / a11y / SEO regressions
# before they hit main. Uses the static dist/ output via staticDistDir —
# no server needed, so the job is fast and doesn't drag in Firebase/env.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build needs a non-empty APP_URL but no real secrets — LHCI only
          # loads static assets, not Firebase/Sentry.
          APP_URL: https://example.com

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
