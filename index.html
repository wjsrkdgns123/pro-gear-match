    <div id="root">
      <!-- Boot splash — replaced the instant React mounts. Keeps users from
           seeing a white flash on slow networks or cold caches. -->
      <style>
        #boot-splash {
          position: fixed; inset: 0;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          gap: 1rem;
          background: #050507; color: #10b981;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
          letter-spacing: 0.2em;
        }
        #boot-splash .mark {
          font-size: 1.25rem; font-weight: 900;
          text-transform: uppercase;
        }
        #boot-splash .bar {
          width: 120px; height: 2px;
          background: rgba(16, 185, 129, 0.15);
          overflow: hidden; position: relative;
        }
        #boot-splash .bar::after {
          content: ""; position: absolute; inset: 0;
          background: #10b981;
          animation: boot-slide 1.1s ease-in-out infinite;
        }
        @keyframes boot-slide {
          0%   { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
        @media (prefers-color-scheme: light) {
          #boot-splash { background: #f8f9fa; color: #10b981; }
        }
      </style>
      <div id="boot-splash">

      </div>
